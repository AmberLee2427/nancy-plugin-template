name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .[dev]
          pip install nexus-nancy

      - name: Verify plugin loads
        run: |
          python -c "from nancy_{{cookiecutter.name}} import register_tools; tools = register_tools(); print(f'Loaded {len(tools)} tools')"